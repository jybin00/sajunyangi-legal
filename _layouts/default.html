<!doctype html>
<html lang="{{ site.lang | default: 'ko-KR' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    <header class="site-header">
      <div class="wrap">
        <a class="brand" href="{{ '/' | relative_url }}">사주냥이</a>
        <nav class="nav" aria-label="법무 문서">
          <a href="{{ '/privacy/' | relative_url }}">개인정보처리방침</a>
          <a href="{{ '/terms/' | relative_url }}">이용약관</a>
          <a href="{{ '/support/' | relative_url }}">고객지원</a>
          <a href="{{ '/account/delete/' | relative_url }}">계정 삭제</a>
        </nav>
      </div>
    </header>

    <main class="wrap page">
      <section class="notice">
        <strong>출시 전 검토용 초안입니다.</strong>
        운영자 정보, 문의처, 시행일, 공개 도메인, 보관기간, 환불 기준, 법률 검토가 확정되기 전에는 App Store 또는 Google Play의 최종 제출 URL로 사용하지 않습니다.
      </section>

      <article class="content">
        {{ content }}
      </article>
    </main>

    <footer class="site-footer">
      <div class="wrap">
        <p>© 사주냥이. 문의처와 운영자 정보는 출시 전 확정 예정입니다.</p>
      </div>
    </footer>
  </body>
</html>
